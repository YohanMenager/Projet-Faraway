version: '3.8'

services:
  # Service PHP-FPM Laravel
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: faraway_app
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
      - ./storage:/app/storage
      - ./bootstrap/cache:/app/bootstrap/cache
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=laravel
      - DB_USERNAME=laravel
      - DB_PASSWORD=secret
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=database
      - QUEUE_CONNECTION=database
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - db
      - redis
    networks:
      - faraway_network

  # Service Nginx
  webserver:
    image: nginx:alpine
    container_name: faraway_webserver
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/app
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./public:/app/public
    depends_on:
      - app
    networks:
      - faraway_network

  # Service PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: faraway_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: laravel
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - faraway_network

  # Service Redis
  redis:
    image: redis:7-alpine
    container_name: faraway_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - faraway_network

volumes:
  postgres_data:
    driver: local

networks:
  faraway_network:
    driver: bridge

